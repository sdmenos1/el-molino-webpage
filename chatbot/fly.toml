# ─────────────────────────────────────────────────────────────
# fly.toml — Configuración de Fly.io para El Molino Bot
# ─────────────────────────────────────────────────────────────
# Región "mad" = Madrid (el más cercano a Fuenlabrada)
# free tier: 3 VMs compartidas + 160 GB tráfico/mes → 0€

app = "el-molino-bot"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

# Servicio HTTP mínimo (solo para el health check de Fly.io)
[http_service]
  internal_port = 8080
  force_https   = false
  auto_stop_machines   = false   # ← CRÍTICO: impide que Fly apague el bot por inactividad
  auto_start_machines  = true
  min_machines_running = 1       # Siempre al menos 1 máquina corriendo

[[vm]]
  memory   = "256mb"   # Suficiente para Baileys (~100 MB uso real)
  cpu_kind = "shared"
  cpus     = 1

# Volumen persistente: guarda la sesión de WhatsApp entre reinicios
# (se crea una sola vez con: fly volumes create whatsapp_session --size 1)
[mounts]
  source      = "whatsapp_session"
  destination = "/app/auth_session"
